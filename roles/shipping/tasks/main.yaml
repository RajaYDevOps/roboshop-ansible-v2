- name: application setup
  import_role:
    name: common
    tasks_from: app-setup

- name: java setup
  import_role:
    name: common
    tasks_from: java

- name: systemd setup
  import_role:
    name: common
    tasks_from: systemd-setup

- name: install python dependencies
  pip:
    name: PyMySQL
    executable: pip3.9

- name: install mysql #need to check about this once as per the internet suggestion
  package:
    name: mysql
    state: present

- name: Load mysql data
  community.mysql.mysql_db:
    state: import
    name: all #need to check about this
    login_user: "{{ mysql_login_user}}"
    login_password: "{{ mysql_login_password }}"
    login_host: "{{ MYSQL_HOST }}"
    target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql

- name: restart 
  import_role:
    name: common
    tasks_from: restart